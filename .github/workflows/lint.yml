name: clippy-check
on:
  pull_request:
    path:
      - 'crates/**'
env:
  RUSTFLAGS: "-Dwarnings"
jobs:
  clippy_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Run Clippy
        run: | 
          nix develop -c \
          cargo clippy --all-targets --all-features
