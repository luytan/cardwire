name: Clippy check
on: 
  push:
    branches:
      - main
      - dev
  pull_request:
env:
  RUSTFLAGS: "-Dwarnings"
jobs:
  clippy_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - name: Run Clippy
        run: | 
          nix develop -c \
          cargo clippy --all-targets --all-features
